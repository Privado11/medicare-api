# ── Servidor ───────────────────────────────────────────
server.port=8080

# ── Base de datos ───────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/medicare_db}
spring.datasource.username=${DB_USERNAME:medicare_user}
spring.datasource.password=${DB_PASSWORD:medicare_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ─────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# ── Flyway ──────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── JWT ─────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:c2VjcmV0b211eWxhcmdvcGFyYW1lZGljYXJlYXBpMjAyNA==}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}



# ── Swagger ─────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true